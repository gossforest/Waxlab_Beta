# ─── WaxLab — Netlify configuration ──────────────────────────────────────────
#
# Required environment variables:
#   SUPABASE_URL       — e.g. https://abcxyz.supabase.co
#   SUPABASE_ANON_KEY  — your project's public anon key
#   ANTHROPIC_API_KEY  — sk-ant-... (server-side only)
#
# Optional:
#   GOOGLE_CLIENT_ID   — only needed if you enable Google Sheets export

[build]
  publish = "."
  command = "bash build.sh"
  functions = "netlify/functions"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

# SPA redirect — must be last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── WaxLab — Netlify configuration ──────────────────────────────────────────
#
# How it works:
#   1. Every push to your GitHub repo triggers a Netlify build.
#   2. The build command writes your Supabase credentials (stored as Netlify
#      environment variables) into a config.js file that the app loads at runtime.
#   3. The finished site is served from the repo root.
#
# Required environment variables (set in Netlify dashboard → Site settings →
# Environment variables):
#   SUPABASE_URL       — e.g. https://abcxyz.supabase.co
#   SUPABASE_ANON_KEY  — your project's public anon key
#
# Optional:
#   GOOGLE_CLIENT_ID   — only needed if you enable Google Sheets export

[build]
  publish = "."
  command = "bash build.sh"

# Redirect everything to index.html (single-page app)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache the app shell aggressively, but not config.js (it changes with env vars)
[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

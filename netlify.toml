# ─── WaxLab — Netlify configuration ──────────────────────────────────────────
#
# Required environment variables (Netlify → Site configuration → Environment variables):
#   SUPABASE_URL       — e.g. https://abcxyz.supabase.co
#   SUPABASE_ANON_KEY  — your project's public anon key
#   ANTHROPIC_API_KEY  — sk-ant-... (kept server-side only, never sent to browser)
#
# Optional:
#   GOOGLE_CLIENT_ID   — only needed if you enable Google Sheets export

[build]
  publish = "."
  command = "bash build.sh"
  functions = "netlify/functions"

# API proxy — routes /api/claude to the serverless function
[[redirects]]
  from   = "/api/claude"
  to     = "/.netlify/functions/claude-proxy"
  status = 200

# Redirect everything else to index.html (single-page app)
# Must come AFTER the /api redirect
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

# ─── WaxLab — Netlify configuration ──────────────────────────────────────────
#
# Required environment variables:
#   SUPABASE_URL       — e.g. https://abcxyz.supabase.co
#   SUPABASE_ANON_KEY  — your project's public anon key
#   ANTHROPIC_API_KEY  — sk-ant-... (server-side only)
#
# Optional:
#   GOOGLE_CLIENT_ID   — only needed for Google Sheets export

[build]
  publish = "."
  command = "bash build.sh"
  functions = "netlify/functions"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

# Service worker must never be cached — stale SW = users stuck on old version
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# Manifest can be cached briefly
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Icons can be cached long-term
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# SPA catch-all — must be last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
